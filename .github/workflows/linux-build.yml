name: Linux Build

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    env:
      PYTHON_VERSION: "3.11"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select gcc-11
        run: |
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-11 110
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-11 110
          sudo update-alternatives --set gcc /usr/bin/gcc-11
          sudo update-alternatives --set g++ /usr/bin/g++-11
          gcc --version

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            flex libpulse-dev \
            libglu1-mesa-dev libxcb-cursor-dev \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev \
            libsamplerate0-dev \
            libical-dev \
            libusb-1.0-0-dev libudev-dev \
            libgsl-dev \
            libfuse2 patchelf

      - name: Install Qt 6.8
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.*'
          host: linux
          target: desktop
          arch: linux_gcc_64
          modules: >-
            qtwebengine qtmultimedia qtserialport qtcharts
            qtconnectivity qtwebchannel qtpositioning qt5compat
          cache: true

      - name: Install R
        run: |
          sudo apt-key adv --keyserver keyserver.ubuntu.com --recv-keys E298A3A825C0D65DFD57CBB651716619E084DAB9
          sudo add-apt-repository -y "deb https://cloud.r-project.org/bin/linux/ubuntu jammy-cran40/"
          sudo apt-get update -qq
          sudo apt-get install -qq r-base-dev

      - name: Install Python for embedding
        run: |
          sudo add-apt-repository -y ppa:deadsnakes/ppa
          sudo apt-get update -qq
          sudo apt-get install -qq python${{ env.PYTHON_VERSION }} python${{ env.PYTHON_VERSION }}-dev python${{ env.PYTHON_VERSION }}-venv

      - name: Install D2XX
        run: |
          mkdir -p D2XX
          wget --no-verbose https://ftdichip.com/wp-content/uploads/2022/07/libftd2xx-x86_64-1.4.27.tgz
          tar xf libftd2xx-x86_64-1.4.27.tgz -C D2XX

      - name: Install SRMIO
        run: |
          git clone https://github.com/rclasen/srmio.git
          cd srmio
          sh genautomake.sh
          ./configure --disable-shared --enable-static
          make --silent -j$(nproc)
          sudo make install

      - name: Configure build
        run: bash appveyor/linux/before_build.sh

      - name: Update translations
        run: lupdate src/src.pro

      - name: Run qmake
        run: >-
          qmake build.pro -r
          QMAKE_CXXFLAGS_WARN_ON+="-Wno-unused-private-field
          -Wno-c++11-narrowing -Wno-deprecated-declarations
          -Wno-deprecated-register -Wno-nullability-completeness
          -Wno-sign-compare -Wno-inconsistent-missing-override"
          QMAKE_CFLAGS_WARN_ON+="-Wno-deprecated-declarations
          -Wno-sign-compare"

      - name: Build qwt
        run: |
          if [ ! -f qwt/lib/libqwt.a ]; then
            make -j$(nproc) sub-qwt
          fi

      - name: Build GoldenCheetah
        run: make -j$(nproc) sub-src

      - name: Create AppImage
        run: bash appveyor/linux/after_build.sh

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: GoldenCheetah-AppImage
          path: GoldenCheetah_v3.8_x64.AppImage
          retention-days: 14
